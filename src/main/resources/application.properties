spring.profiles.active=test
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# OAuth2 Configuration
security.client-id=${CLIENT_ID:myclientid}
security.client-secret=${CLIENT_SECRET:myclientsecret}
security.jwt.duration=${JWT_DURATION:86400}
security.jwt.secret=mySecretKey123456789012345678901234567890

# CORS Configuration
cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Apenas para desenvolvimento, relaxa a exigência de PKCE
spring.security.oauth2.authorizationserver.client.myclientid.settings.token.require-proof-key=false
